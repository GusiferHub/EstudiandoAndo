version: '2.4'
services:
  postgres:
    image: postgres:16-alpine
    container_name: study-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-study_app}
      POSTGRES_USER: ${POSTGRES_USER:-study_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-study_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U study_user -d study_app"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: study-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      PORT: ${PORT:-3000}
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: ${DATABASE_URL:-postgres://study_user:study_password@postgres:5432/study_app}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8080}
      MAX_PDF_MB: ${MAX_PDF_MB:-20}
    ports:
      - "3000:3000"

volumes:
  postgres_data:



